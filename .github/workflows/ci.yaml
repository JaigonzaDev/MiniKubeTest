name: Build and Push to GHCR

# El pipeline se ejecutará cada vez que hagas un push a la rama main
on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # github.repository toma automáticamente "TuUsuario/hola-front"
  IMAGE_NAME: jaigonzadev/minikubetest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Permiso necesario para subir la imagen a GHCR

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Este token lo provee GitHub automáticamente

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
